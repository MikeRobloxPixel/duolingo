name: Do a Duolingo lesson

on:
  workflow_dispatch:
    inputs:
      lessons:
        default: 5
        description: 'Number of lessons to be completed'
        required: false
        type: number
  schedule:
    - cron: '0 20 * * *' # Запуск каждый день в 23:00 по МСК (20:00 UTC)

jobs:
  study:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
  with:
    node-version: 18

- run: node index.js
        env:
          DUOLINGO_JWT: ${{ secrets.DUOLINGO_JWT }}
          LESSONS: 5
