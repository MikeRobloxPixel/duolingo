name: Duolingo Study

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  study:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run lessons
        env:
          DUOLINGO_JWT: ${{ secrets.DUOLINGO_JWT }}
          LESSONS: "5"
        run: bun run index.js
